services:
  api:
    build:
      context: ./backend
    command: ./entrypoint.sh
    ports:
      - 8000:8000
    depends_on:
      db:
        condition: service_healthy
        restart: true
    environment:
      - DATABASE_URL=postgresql+psycopg://user:secret@db/db
  db:
    image: postgres:18.3-alpine3.23
    ports:
      - 5432:5432
    volumes:
      - tasks:/var/lib/postgresql
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
  web_chat:
    build:
      context: ./backend
    command: uv run uvicorn app.agent.task_agent:app --host 0.0.0.0 --port 7932
    ports:
      - 7932:7932
    depends_on:
      db:
        condition: service_healthy
        restart: true
    environment:
      - DATABASE_URL=postgresql+psycopg://user:secret@db/db
    env_file:
      - ./backend/.env

volumes:
  tasks:
