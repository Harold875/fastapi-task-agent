services:
  api:
    build:
      context: ./backend
    ports:
      - 8000:8000
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql+psycopg://user:secret@db/db
  db:
    image: postgres:18.3-alpine3.23
    ports:
      - 5432:5432
    volumes:
      - tasks:/var/lib/postgresql
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: db


volumes:
  tasks:
